services:
  dashboard-api:
    build: .
    container_name: docker-manager-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/usr/src/app/data
    env_file:
      - .env
    networks:
      - docker-manager-net
    depends_on:
      - nginx
      - certbot

  nginx:
    build: ./nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/nginx/conf.d:/etc/nginx/conf.d
      - ./data/nginx/ssl:/etc/letsencrypt
      - ./data/nginx/logs:/var/log/nginx
      - ./data/nginx/www:/var/www/certbot
    networks:
      - docker-manager-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./data/nginx/ssl:/etc/letsencrypt
      - ./data/nginx/www:/var/www/certbot
    entrypoint: ["sleep", "infinity"]

networks:
  docker-manager-net:
    driver: bridge
